[build]
  base = "frontend"
  command = "npm install && CI=false npm run build"
  publish = "build"

[build.environment]
  REACT_APP_API_URL = "https://helpdesk-ticketing-system-2-5eye.onrender.com/api"
  CI = "false"
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://helpdesk-ticketing-system-2-5eye.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
